name: Redroid WebRTC Stream
on: workflow_dispatch

jobs:
  run-redroid-webrtc:
    runs-on: ubuntu-latest
    steps:
      - name: Preparar Kernel (Indispensable para Redroid)
        run: |
          sudo apt-get update
          sudo apt-get install -y linux-modules-extra-$(uname -r)
          sudo modprobe binder_linux
          sudo modprobe ashmem_linux

      - name: Ejecutar Redroid con WebRTC
        run: |
          # Aquí usamos la imagen que ya tiene el soporte WebRTC/Selkies
          docker run -d \
            --privileged \
            --name redroid-webrtc \
            -p 8080:8080 \
            -p 5555:5555 \
            j7819/redroid-webrtc:11.0.0 # O la versión que indique el repo

